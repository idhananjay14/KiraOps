apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kiraops
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/idhananjay14/KiraOps.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: kiraops

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
