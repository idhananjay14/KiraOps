apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: kiraops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: kiraops-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: "production"
            - name: AUTH_SERVICE_URL
              value: "http://auth:3002"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:3003"
            - name: ORDER_SERVICE_URL
              value: "http://orders:3004"
            - name: USER_SERVICE_URL
              value: "http://user-service:3005"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: kiraops
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  ports:
    - name: http 
      port: 3001
      targetPort: 3001
