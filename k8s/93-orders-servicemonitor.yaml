apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: orders
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - kiraops
  selector:
    matchLabels:
      app: orders
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
